# =================
# NovelOS Runtime协议
# =================
# Runtime是所有模块的运行环境，是系统的唯一入口（通过内核调度）。

核心职责:
  - 模块生命周期管理 (按照生命周期协议)
  - 任务队列调度
  - 并发控制（限制同时运行的Agent数量）
  - Token预算管理（跟踪每次API调用的Token消耗）
  - 模型路由（根据任务类型选择模型，但实际调用通过模型协同）

唯一入口:
  所有外部请求（来自CLI、Web、API）必须通过Runtime分配任务，不得直接实例化业务模块。

运行模式:
  - 正常模式: 全功能
  - 维护模式: 只读，不接受新创作任务
  - 降级模式: 核心功能可用，非关键算法可能降低精度

异常恢复:
  - 任何模块抛出未捕获异常，Runtime需捕获并尝试重启该模块。
  - 连续失败3次，标记为不可用并通知监控。

配置来源: 01_配置中心/Runtime配置
# ====================
# NovelOS Agent权限协议
# ====================
# 定义每种Agent的能力边界。

Agent类型:
  总导演Agent:
    权限:
      - 读取规划系统
      - 读取世界状态
      - 通过总线调度其他Agent
    禁止:
      - 直接修改数据
      - 直接调用模型API
      - 直接操作上下文

  世界Agent:
    权限:
      - 读写世界引擎（在规则允许范围内）
    ……

  角色Agent:
    权限:
      - 读写角色引擎

  剧情Agent:
    权限:
      - 读写剧情引擎
      - 注册伏笔

  爽文Agent:
    权限:
      - 调用爽感算法
      - 提供爽感建议给剧情Agent

  审核Agent:
    权限:
      - 读取生成文本
      - 标记违规

  修复Agent:
    权限:
      - 基于审核结果请求重新生成

通用禁止:
  - 所有Agent禁止绕过模型协同直接调用API模型 (21)
  - 禁止读取其他Agent的内部状态
  - 禁止在未经总导演授权下启动长期运行任务
# 生命周期协议 v1.0
钩子:
  on_init: {触发: 模块加载时, 输入: 配置字典, 输出: 布尔值, 要求: [加载配置, 建立结构, 注册事件, 设置日志], 禁止: [启动线程, 访问未初始化模块]}
  on_start: {触发: 所有模块初始化后, 输出: 启动状态, 要求: [启动后台任务, 激活接口], 禁止: [修改配置, 重新初始化]}
  on_running: {触发: 周期心跳30s, 输出: 健康状态字典, 要求: [上报指标, 检测异常], 禁止: [长时间阻塞]}
  on_suspend: {触发: 维护/热更新, 输入: 暂停原因, 要求: [保存快照, 停止新任务, 等待任务完成, 释放非必要资源]}
  on_destroy: {触发: 模块卸载/系统关闭, 要求: [释放资源, 持久化数据, 注销监听]}
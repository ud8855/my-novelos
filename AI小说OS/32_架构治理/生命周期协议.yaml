# ====================
# NovelOS 生命周期协议
# ====================
# 所有模块必须实现的五个生命周期钩子。
# Runtime 负责按顺序调用。

生命周期钩子:
  初始化:
    钩子名: on_init
    触发时机: 模块被加载时（系统启动或热更新后）
    输入: 配置字典 (来自配置中心)
    输出: 初始化状态 (True/False)
    要求:
      - 加载必需的配置
      - 建立内部数据结构
      - 注册到核心总线的事件监听
      - 设置日志器
    禁止:
      - 启动任何线程或异步任务（应在启动阶段做）
      - 访问其他未初始化的模块

  启动:
    钩子名: on_start
    触发时机: 所有模块初始化完成后，由Runtime统一调用
    输入: 无
    输出: 启动状态
    要求:
      - 启动后台任务（如定时器、守护线程）
      - 激活对外接口（如API监听）
    禁止:
      - 修改配置
      - 重新初始化

  运行中:
    钩子名: on_running
    触发时机: 模块处于活动状态时周期性调用（心跳）
    频率: 可配置（默认每30秒）
    输入: 无
    输出: 健康状态字典 { "状态": "正常|降级|错误", "详情": {} }
    要求:
      - 上报关键指标
      - 检测内部状态是否异常
    禁止:
      - 长时间阻塞（超时1秒）

  挂起:
    钩子名: on_suspend
    触发时机: 系统进入维护/热更新状态
    输入: 暂停原因
    输出: 无
    要求:
      - 保存当前状态快照
      - 停止接受新任务，等待现有任务完成
      - 释放非必要资源

  销毁:
    钩子名: on_destroy
    触发时机: 模块被卸载（热更新/系统关闭）
    输入: 无
    输出: 无
    要求:
      - 释放所有资源
      - 持久化必要数据
      - 注销事件监听
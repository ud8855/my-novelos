# ==============
# NovelOS 接口协议
# ==============
# 规定每个模块对外暴露的公共方法命名与签名规范。

方法命名:
  获取数据: get_XXX
  设置数据: set_XXX
  更新数据: update_XXX
  删除数据: delete_XXX (仅允许软删除)
  查询: query_XXX
  处理: process_XXX
  验证: validate_XXX
  计算: calculate_XXX

参数规范:
  第一个参数: 必须能接受一个字典形式的配置覆盖（**kwargs）
  返回值: 必须返回字典 {'成功': True/False, '数据': ..., '错误': 错误信息}

异常处理:
  所有公共方法禁止直接抛出异常，必须捕获并返回错误字典。
  内部使用日志记录原始异常。

版本兼容:
  公共接口增加新参数时，必须提供默认值以保持向后兼容。
# ======================
# NovelOS 数据结构协议
# ======================
# 所有模块间传递的数据必须遵守以下结构。
# 使用 Pydantic 或 dataclasses 实现，字段名使用中文。

全局基础模型:
  小说标识:
    小说ID: 字符串 (UUID)
    标题: 字符串
    创建时间: 时间戳

  章节标识:
    章节ID: 字符串
    章节号: 整数
    小说ID: 字符串

  角色标识:
    角色ID: 字符串
    角色名: 字符串

  世界标识:
    世界ID: 字符串
    世界名称: 字符串

模块专用结构: (示例，各模块在协议层具体定义)
  剧情事件:
    事件ID: 字符串
    事件类型: "冲突|反转|悬疑|日常"
    相关角色: 列表[角色标识]
    发生章节: 整数

  伏笔记录:
    伏笔ID: 字符串
    描述: 字符串
    埋设章节: 整数
    计划回收章节: 整数
    状态: "已埋|部分回收|已回收|废弃"

  爽感曲线点:
    章节: 整数
    爽感值: 浮点数 (0~1)
    类型: "打脸|升级|暧昧|……"

  上下文包:
    提示词模板: 字符串
    参数: 字典
    优先级: 整数
    有效期: 时间窗口 (秒)

  审核报告:
    是否安全: 布尔
    违规类型: 列表[字符串]
    建议: 字符串

数据交换格式: JSON（API层负责序列化，内部可用Python对象）

存储规范:
  - 长期记忆使用向量数据库（Qdrant），通过记忆系统访问。
  - 状态快照可序列化为 JSON 文件，由状态系统管理。
  - 章节文本归档使用文件系统或对象存储，由导出系统统一管理。
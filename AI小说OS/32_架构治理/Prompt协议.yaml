# =================
# NovelOS Prompt协议
# =================
# 所有AI调用必须使用模板化Prompt，禁止硬编码。

模板结构:
  模板ID: 字符串 (如 "novel.outline.generate")
  模板版本: 字符串
  模板类型: "system" | "user"
  模板内容: 使用 {参数名} 作为占位符
  必需参数: 列表
  可选参数: 列表
  输出格式说明: 字符串 (告知AI期望的输出格式)

模板存放位置: 01_配置中心/Prompt配置/

模板调用:
  - 上下文系统负责加载模板并填充参数
  - 模型协同负责发送最终的填充后Prompt

禁止:
  - 在代码中直接拼接字符串作为Prompt
  - 修改模板的热加载版本，必须通过配置中心更新
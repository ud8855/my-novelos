# =====================
# NovelOS 模块依赖规则
# =====================
# 本文件定义所有层之间的允许/禁止调用关系。
# 违反者将被审计日志记录并阻断。

# 层定义（按数字编号）
层:
  00: 启动入口
  01: 配置中心
  02: 协议层
  03: 内核系统
  04: Runtime运行时
  05: 核心总线
  06: 数据层
  07: 状态系统
  08: 记忆系统
  09: 上下文系统
  10: 世界引擎
  11: 角色引擎
  12: 剧情引擎
  13: 推理系统
  14: 规划系统
  15: Agent生态
  16: 规则引擎
  17: 爽感算法
  18: 读者模拟
  19: 创作流水线
  20: 模型协同
  21: API模型
  22: 审核安全
  23: 去AI化
  24: 创世系统
  25: UI界面
  26: 导出系统
  27: 日志监控
  28: 插件系统
  29: 自学习系统
  30: 测试系统
  31: 文档中心
  32: 架构治理
  99: 实验室

# 依赖规则：下方列出“允许的依赖目标”（即只能调用这些层的模块）
允许依赖:
  # 启动入口：只能调用配置中心、日志、内核、核心总线（为了初始化）
  "00":
    - "01"  # 配置中心
    - "03"  # 内核系统
    - "05"  # 核心总线
    - "27"  # 日志监控
    - "32"  # 架构治理
  # 配置中心：不依赖任何业务层，仅能调用日志
  "01":
    - "27"
    - "32"
  # 协议层：纯定义，无依赖
  "02": []
  # 内核系统：可调用配置、协议、核心总线、日志、数据层（元数据）、架构治理
  "03":
    - "01"
    - "02"
    - "05"
    - "06"  # 只允许访问元数据
    - "27"
    - "32"
  # Runtime运行时：仅调用配置、协议、核心总线、日志、模型协同（但禁止直接调API）
  "04":
    - "01"
    - "02"
    - "05"
    - "20"  # 模型协同（不是21）
    - "27"
    - "32"
  # 核心总线：仅依赖协议层和日志
  "05":
    - "02"
    - "27"
    - "32"
  # 数据层：只依赖协议层、日志
  "06":
    - "02"
    - "27"
    - "32"
  # 状态系统：可依赖数据层、协议、日志
  "07":
    - "02"
    - "06"
    - "27"
    - "32"
  # 记忆系统：可依赖数据层、状态、协议、日志
  "08":
    - "02"
    - "06"
    - "07"
    - "27"
    - "32"
  # 上下文系统：依赖配置、协议、记忆、日志
  "09":
    - "01"
    - "02"
    - "08"
    - "27"
    - "32"
  # 世界引擎：依赖数据层、状态、协议、日志
  "10":
    - "02"
    - "06"
    - "07"
    - "27"
    - "32"
  # 角色引擎：依赖数据层、状态、世界引擎、协议、日志
  "11":
    - "02"
    - "06"
    - "07"
    - "10"
    - "27"
    - "32"
  # 剧情引擎：依赖数据层、状态、世界、角色、协议、日志
  "12":
    - "02"
    - "06"
    - "07"
    - "10"
    - "11"
    - "27"
    - "32"
  # 推理系统：依赖数据、状态、世界、角色、剧情、协议、日志
  "13":
    - "02"
    - "06"
    - "07"
    - "10"
    - "11"
    - "12"
    - "27"
    - "32"
  # 规划系统：依赖数据、状态、剧情、推理、协议、日志
  "14":
    - "02"
    - "06"
    - "07"
    - "12"
    - "13"
    - "27"
    - "32"
  # Agent生态：只能依赖规划、推理、协议、核心总线、模型协同（不直调API）
  "15":
    - "02"
    - "05"  # 通过总线通信
    - "14"
    - "13"
    - "20"  # 模型协同
    - "27"
    - "32"
  # 规则引擎：依赖数据、协议、日志
  "16":
    - "02"
    - "06"
    - "27"
    - "32"
  # 爽感算法：依赖数据、剧情、推理、协议、日志
  "17":
    - "02"
    - "06"
    - "12"
    - "13"
    - "27"
    - "32"
  # 读者模拟：依赖数据、剧情、爽感、协议、日志
  "18":
    - "02"
    - "06"
    - "12"
    - "17"
    - "27"
    - "32"
  # 创作流水线：依赖规划、Agent、上下文、去AI化、协议、总线、日志，但具体生成必须通过模型协同
  "19":
    - "02"
    - "05"
    - "09"
    - "14"
    - "15"
    - "20"  # 模型协同
    - "23"  # 去AI化
    - "27"
    - "32"
  # 模型协同：依赖配置、协议、API模型（唯一允许调21的层）、日志
  "20":
    - "01"
    - "02"
    - "21"  # 唯一合法调用21的层
    - "27"
    - "32"
  # API模型：依赖配置、协议、日志（无其他业务依赖）
  "21":
    - "01"
    - "02"
    - "27"
    - "32"
  # 审核安全：依赖数据、协议、日志（独立，不依赖业务）
  "22":
    - "02"
    - "06"
    - "27"
    - "32"
  # 去AI化：依赖数据、上下文、协议、日志
  "23":
    - "02"
    - "06"
    - "09"
    - "27"
    - "32"
  # 创世系统：依赖世界引擎、数据、协议、日志
  "24":
    - "02"
    - "06"
    - "10"
    - "27"
    - "32"
  # UI界面：只能依赖核心总线、配置、协议、日志（绝对禁止直连数据层）
  "25":
    - "01"
    - "02"
    - "05"  # 通过总线与后端通信
    - "27"
    - "32"
  # 导出系统：依赖数据、配置、协议、日志
  "26":
    - "01"
    - "02"
    - "06"
    - "27"
    - "32"
  # 日志监控：独立，可被所有层依赖（本身不依赖业务层）
  "27":
    - "02"
    - "32"
  # 插件系统：依赖配置、协议、核心总线、日志（沙盒隔离）
  "28":
    - "01"
    - "02"
    - "05"
    - "27"
    - "32"
  # 自学习系统：依赖数据、规划、Agent、协议、日志（只读）
  "29":
    - "02"
    - "06"  # 只读访问
    - "14"
    - "15"
    - "27"
    - "32"
  # 测试系统：可依赖所有（但仅用于测试环境）
  "30":
    - "*"  # 测试豁免
  # 文档中心：不依赖任何业务
  "31": []
  # 架构治理：仅可被配置中心、日志、核心总线引用
  "32": []
  # 实验室：可依赖所有（但产出不得进入主干）
  "99":
    - "*"  # 豁免，但标记为不稳定

# 绝对禁止的依赖（跨层污染）
禁止依赖:
  # UI层直连数据
  - "25 -> 06"
  # Agent直接调用API模型
  - "15 -> 21"
  # Runtime写业务逻辑（不能调用剧情/爽感等）
  - "04 -> 12"
  - "04 -> 17"
  # 业务层直接调模型（必须经过20）
  - "19 -> 21"
  - "12 -> 21"
  # 任何层直接调用模型API（除20外）
  - ".* -> 21"  # 正则表示除20外所有层不能直接依赖21
  # 配置中心依赖业务层
  - "01 -> (0[6-9]|1[0-9]|2[0-9])"  # 配置中心不得依赖06-29之间的业务层
# NovelOS 数据结构协议 v1.0
基础模型:
  小说标识: {小说ID: UUID, 标题: str, 创建时间: timestamp}
  章节标识: {章节ID: str, 章节号: int, 小说ID: str}
  角色标识: {角色ID: str, 角色名: str}
  世界标识: {世界ID: str, 世界名称: str}
模块结构示例:
  剧情事件: {事件ID: str, 类型: "冲突|反转|悬疑|日常", 相关角色: list, 发生章节: int}
  伏笔记录: {伏笔ID: str, 描述: str, 埋设章节: int, 计划回收章节: int, 状态: "已埋|部分回收|已回收|废弃"}
  爽感曲线点: {章节: int, 爽感值: float(0~1), 类型: str}
  上下文包: {提示词模板: str, 参数: dict, 优先级: int, 有效期: int(秒)}
  审核报告: {是否安全: bool, 违规类型: list, 建议: str}
序列化: JSON
存储: [长期记忆用向量库, 状态快照用JSON, 章节归档用文件/对象存储]

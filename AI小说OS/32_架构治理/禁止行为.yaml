# ================
# NovelOS 禁止行为
# ================
# 以下行为在任何情况下绝对禁止，违反将触发审计警报。

禁止行为列表:
  - 硬编码API密钥
  - 硬编码Prompt
  - 循环导入 (import循环)
  - UI直接访问数据库
  - 业务层直接调用21_API模型
  - 模块直接操作其他模块的内部数据结构
  - 绕过配置中心读取环境变量（所有配置必须由配置中心统一提供）
  - 修改不可变目录中的文件 (00, 01, 02, 03, 06元数据, 10世界法则, 32架构治理中的规则文件)
  - 在生产代码中使用 eval() 或 exec()
  - 禁用或篡改日志系统
  - 在Agent中执行系统命令
  - 将实验性功能（99_实验室）合并入主干
  - 删除伏笔记录（只能标记为废弃）
  - 修改已归档章节
  - 单人操作超过 10000 Token 不经过预算审批